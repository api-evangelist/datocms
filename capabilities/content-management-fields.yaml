naftiko: 1.0.0-alpha2
info:
  label: DatoCMS Content Management API — Fields
  description: 'DatoCMS Content Management API — Fields. 1 operations. Lead operation: List fields. Self-contained Naftiko
    capability covering one Datocms business surface.'
  tags:
  - Datocms
  - Fields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DATOCMS_API_KEY: DATOCMS_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-management-fields
    baseUri: https://site-api.datocms.com
    description: DatoCMS Content Management API — Fields business capability. Self-contained, no shared references.
    resources:
    - name: fields
      path: /fields
      operations:
      - name: listfields
        method: GET
        description: List fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DATOCMS_API_KEY}}'
  exposes:
  - type: rest
    namespace: content-management-fields-rest
    port: 8080
    description: REST adapter for DatoCMS Content Management API — Fields. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fields
      name: fields
      description: REST surface for fields.
      operations:
      - method: GET
        name: listfields
        description: List fields
        call: content-management-fields.listfields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-management-fields-mcp
    port: 9090
    transport: http
    description: MCP adapter for DatoCMS Content Management API — Fields. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-fields
      description: List fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-management-fields.listfields
      outputParameters:
      - type: object
        mapping: $.
