    description: DatoCMS Content Management API — Items business capability. Self-contained, no shared references.
    resources:
    - name: items
      path: /items
      operations:
      - name: listitems
        method: GET
        description: List items (records)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter[type]
          in: query
          type: string
          description: Item type API key or ID to filter by.
      - name: createitem
        method: POST
        description: Create an item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: items-itemId
      path: /items/{itemId}
      operations:
      - name: getitem
        method: GET
        description: Retrieve an item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateitem
        method: PUT
        description: Update an item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteitem
        method: DELETE
        description: Delete an item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: items-itemId-publish
      path: /items/{itemId}/publish
      operations:
      - name: publishitem
        method: PUT
        description: Publish an item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DATOCMS_API_KEY}}'
  exposes:
  - type: rest
    namespace: content-management-items-rest
    port: 8080
    description: REST adapter for DatoCMS Content Management API — Items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/items
      name: items
      description: REST surface for items.
      operations:
      - method: GET
        name: listitems
        description: List items (records)
        call: content-management-items.listitems
        with:
          filter[type]: rest.filter[type]
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createitem
        description: Create an item
        call: content-management-items.createitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/items/{itemid}
      name: items-itemid
      description: REST surface for items-itemId.
      operations:
      - method: GET
        name: getitem
        description: Retrieve an item
        call: content-management-items.getitem
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateitem
        description: Update an item
        call: content-management-items.updateitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteitem
