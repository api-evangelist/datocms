        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/items/{itemid}/publish
      name: items-itemid-publish
      description: REST surface for items-itemId-publish.
      operations:
      - method: PUT
        name: publishitem
        description: Publish an item
        call: content-management-items.publishitem
        outputParameters:
        - type: object
          mapping: $.
